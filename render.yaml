# Render blueprint for the Jiaranest catalog API (Phase 2 backend).
#
# Deploys a NestJS web service + a managed Postgres database. Render checks out
# the WHOLE repo, so the seed's import of ../../src/app/core/data/mock-data.ts
# resolves. `rootDir: server` runs the build/start commands inside server/.
#
# In the Render dashboard: New + → Blueprint → pick this repo. It reads this file.
# After first deploy, set CORS_ORIGIN to your GitHub Pages URL (see DEPLOY.md).

databases:
  - name: jiaranest-db
    databaseName: jiaranest
    plan: free

services:
  - type: web
    name: jiaranest-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jiaranest-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        sync: false # set this yourself to your GitHub Pages URL after first deploy
