<!-- Fixed guide sparrow; JS sets its transform to sit beside the active title.
     Pseudo-3D: layered shading via gradients, a soft body sheen, and a two-part
     rigged wing (far wing behind the body, near wing in front) for parallax
     depth during the flap. -->
<div class="guide-bird" #bird aria-hidden="true">
  <svg class="guide-bird-svg" viewBox="0 0 40 32">
    <defs>
      <radialGradient id="birdBody" cx="38%" cy="34%" r="75%">
        <stop offset="0%" stop-color="#a5875c" />
        <stop offset="55%" stop-color="#8a6f4a" />
        <stop offset="100%" stop-color="#6d5636" />
      </radialGradient>
      <radialGradient id="birdHead" cx="40%" cy="35%" r="70%">
        <stop offset="0%" stop-color="#b1936a" />
        <stop offset="100%" stop-color="#8a6f4a" />
      </radialGradient>
      <linearGradient id="birdWing" x1="0" y1="0" x2="0.6" y2="1">
        <stop offset="0%" stop-color="#c7a677" />
        <stop offset="100%" stop-color="#9c7c50" />
      </linearGradient>
      <linearGradient id="birdBeak" x1="0" y1="0" x2="1" y2="0.4">
        <stop offset="0%" stop-color="#f0b954" />
        <stop offset="100%" stop-color="#d0902a" />
      </linearGradient>
    </defs>

    <!-- FAR wing (behind the body) — flaps in counter-phase for parallax depth -->
    <path class="guide-bird-wing-far" d="M14 15 Q18 6 23 14 Q18 17 14 15 Z" fill="#7d6444" />

    <!-- Tail -->
    <path d="M6 18 L-4 14 L-2 20 L-4 25 L7 22 Z" fill="#6f5838" />

    <!-- Body -->
    <ellipse cx="18" cy="19" rx="11" ry="8" fill="url(#birdBody)" />
    <!-- Belly highlight (soft underside sheen) -->
    <ellipse cx="16" cy="24" rx="7" ry="3.6" fill="#d8bd91" opacity="0.85" />
    <!-- Top-light sheen on the back -->
    <ellipse cx="16" cy="14.5" rx="6.5" ry="2.6" fill="#c3a678" opacity="0.5" />

    <!-- Head -->
    <circle cx="27" cy="13" r="6.5" fill="url(#birdHead)" />
    <!-- Beak -->
    <path d="M32.5 12 L39 13.5 L32.5 15.5 Z" fill="url(#birdBeak)" />
    <!-- Eye + highlight -->
    <circle cx="28.5" cy="11.5" r="1.7" fill="#2a2018" />
    <circle cx="29.1" cy="10.9" r="0.55" fill="#fff" opacity="0.9" />
    <!-- Head tuft -->
    <path d="M22 6 Q26 2 29 6" stroke="#6f5838" stroke-width="1.4" fill="none" stroke-linecap="round" />

    <!-- NEAR wing (in front of the body) — the primary flapping wing -->
    <path class="guide-bird-wing" d="M13 15 Q18 4 24 13 Q18 17 13 15 Z" fill="url(#birdWing)" />
  </svg>
</div>
