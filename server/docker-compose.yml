# Local Postgres for the Jiaranest API (local dev).
#   docker compose up -d      # start
#   docker compose down       # stop (keeps data)
#   docker compose down -v     # stop + wipe data
services:
  db:
    image: postgres:16-alpine
    container_name: jiaranest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jiaranest
      POSTGRES_PASSWORD: jiaranest
      POSTGRES_DB: jiaranest
    ports:
      - '5432:5432'
    volumes:
      - jiaranest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jiaranest -d jiaranest']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jiaranest_pgdata:
